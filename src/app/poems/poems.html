<section class="poems-wrapper">

  <div class="poems-header">
    <h1>Poems</h1>
    <p>Words shaped through moments and meaning.</p>
  </div>

  <div class="poems-grid">
    <div class="poem-card" *ngFor="let poem of poems">
      <h2>{{ poem.title }}</h2>
      <p class="poem-content">{{ poem.content }}</p>
      <span class="poem-date">{{ poem.createdDate | date:'mediumDate' }}</span>
    </div>
  </div>

  <!-- Pagination arrows + page numbers — same style as gallery -->
  <div class="pagination-bar" *ngIf="totalPages >= 1">
    <button class="pg-btn pg-arrow" (click)="goToPage(1)" [disabled]="currentPage === 1" title="First">&#171;</button>
    <button class="pg-btn pg-arrow" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1" title="Previous">&#8249;</button>

    <button
      class="pg-btn pg-num"
      *ngFor="let p of pageNumbers"
      [class.active]="p === currentPage"
      (click)="goToPage(p)">
      {{ p }}
    </button>

    <button class="pg-btn pg-arrow" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages" title="Next">&#8250;</button>
    <button class="pg-btn pg-arrow" (click)="goToPage(totalPages)" [disabled]="currentPage === totalPages" title="Last">&#187;</button>
  </div>

</section>
