<section class="poems-wrapper">

  <div class="poems-header">
    <h1>Poems</h1>
    <p>Words shaped through moments and meaning.</p>
  </div>

  <div class="poems-grid">
    <div class="poem-card" *ngFor="let poem of poems">

      <h2>{{ poem.title }}</h2>
      <p class="poem-content">{{ poem.content }}</p>
      <span class="poem-date">
        {{ poem.createdDate | date:'mediumDate' }}
      </span>

    </div>
    </div>  
    <div class="pagination">
  <button (click)="prevPage()"*ngif="currentPage > 1">Previous</button>
  <button (click)="nextPage()">Next</button>
</div>

</section>
